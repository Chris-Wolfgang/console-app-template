# PR validation workflow for template pack repository
# Builds all template projects and runs security scanning
# No test stage — this repo contains only dotnet new templates
#
# This repo's PRs come from same-repo branches (single maintainer), not
# untrusted forks, so it uses `pull_request` (not `pull_request_target`).
# That runs the PR's own workflow against the PR's own code - simpler, and
# it drops the fork-safety apparatus (main-ref checkouts, fetch-config-from-main,
# the protected-file guard) that only makes sense for untrusted fork PRs.
# persist-credentials: false still avoids writing the token into git config.

name: PR Checks

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # SECRETS SCAN: Detect leaked credentials before merge
  # ============================================================================
  secrets-scan:
    name: "Secrets Scan (gitleaks)"
    runs-on: ubuntu-latest
    if: github.repository != 'Chris-Wolfgang/repo-template'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          GITLEAKS_VERSION="8.24.0"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --verbose --redact
        shell: bash

  # ============================================================================
  # DETECTION: Check if .csproj files exist
  # ============================================================================
  detect-projects:
    name: "Detect .NET Projects"
    runs-on: ubuntu-latest
    if: github.repository != 'Chris-Wolfgang/repo-template'
    outputs:
      has-projects: ${{ steps.check-projects.outputs.has-projects }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Check for .NET project files
        id: check-projects
        run: |
          if git ls-files '*.csproj' '*.vbproj' '*.fsproj' | grep -q .; then
            echo "has-projects=true" >> "$GITHUB_OUTPUT"
            echo "✅ Found .NET project files"
          else
            echo "has-projects=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No .NET project files found - skipping build"
          fi

  # ============================================================================
  # BUILD: Validate all template projects compile and pack
  # ============================================================================
  build-and-validate:
    name: "Build & Validate Templates"
    runs-on: windows-latest
    needs: detect-projects
    if: github.repository != 'Chris-Wolfgang/repo-template' && needs.detect-projects.outputs.has-projects == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore and build all projects (Release)
        shell: pwsh
        run: |
          $projects = Get-ChildItem -Path 'src' -Recurse -Filter '*.csproj'

          if ($projects.Count -eq 0) {
            Write-Error "❌ No projects found in src/ directory"
            exit 1
          }

          foreach ($proj in $projects) {
            Write-Host "📦 Restoring $($proj.Name)" -ForegroundColor Cyan
            dotnet restore $proj.FullName

            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Restore failed for $($proj.Name)"
              exit $LASTEXITCODE
            }

            Write-Host "🔨 Building $($proj.Name)" -ForegroundColor Cyan
            dotnet build $proj.FullName --no-restore --configuration Release

            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Build failed for $($proj.Name)"
              exit $LASTEXITCODE
            }
          }

          Write-Host "✅ All projects built successfully" -ForegroundColor Green

      - name: Pack NuGet packages (validate packaging)
        shell: pwsh
        run: |
          $packagesPath = Join-Path $PWD 'nuget-packages'
          New-Item -ItemType Directory -Force -Path $packagesPath | Out-Null

          $packProjects = Get-ChildItem -Path 'src' -Recurse -Filter '*.csproj' | Where-Object {
            $_.Name -like '*template.pack*'
          }

          foreach ($proj in $packProjects) {
            Write-Host "📦 Packing $($proj.Name)" -ForegroundColor Cyan
            dotnet pack $proj.FullName --no-build --configuration Release --output $packagesPath

            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Pack failed for $($proj.Name)"
              exit $LASTEXITCODE
            }
          }

          $packages = Get-ChildItem -Path $packagesPath -Filter '*.nupkg'
          Write-Host "✅ Created $($packages.Count) NuGet package(s):" -ForegroundColor Green
          $packages | ForEach-Object { Write-Host "   $($_.Name)" }

  # ============================================================================
  # SMOKE MATRIX: build the GENERATED project across OS x SDK
  #
  # The generated project is a different build environment than this repo:
  # no .editorconfig (analyzer DEFAULT severities apply), the user's SDK
  # (LangVersion=latest resolves per SDK - a C# 13 escape broke .NET 8 SDK
  # users while the repo built fine on SDK 10), and Release builds treat
  # warnings as errors. This matrix packs the console template, installs
  # it, instantiates a project and builds/runs it the way a user would.
  # SDK 8 (the documented minimum) runs on all three OSes; newer SDKs are
  # spot-checked on Linux.
  # ============================================================================
  template-smoke-matrix:
    name: "Template Smoke (${{ matrix.os }}, SDK ${{ matrix.sdk }})"
    runs-on: ${{ matrix.os }}
    needs: detect-projects
    # Same-repo PRs only: under pull_request_target secrets are available to
    # the workflow, and this job goes beyond building PR code - it RUNS the
    # generated app. Skipping forked PRs closes the exfiltration path; a
    # maintainer can re-run the smoke matrix after pulling a fork's changes
    # into a same-repo branch.
    if: >-
      github.repository != 'Chris-Wolfgang/repo-template' &&
      needs.detect-projects.outputs.has-projects == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sdk: "8.0"
          - os: windows-latest
            sdk: "8.0"
          - os: macos-latest
            sdk: "8.0"
          # ARM64 Linux (free runner for public repos). The generated app is pure
          # managed .NET, so this is a low-signal but near-zero-cost proof that it
          # packs/installs/builds/runs on ARM64 too.
          - os: ubuntu-24.04-arm
            sdk: "8.0"
          - os: ubuntu-latest
            sdk: "9.0"
          - os: ubuntu-latest
            sdk: "10.0"
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        # The matrix SDK builds the generated project; 10.0.x packs the
        # template itself (the pack csproj targets netstandard2.0).
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            ${{ matrix.sdk }}.x
            10.0.x

      - name: Pack the console + subcommand templates
        # Packing is the repo's side of the workflow (the release pipeline does
        # it with the repo's SDK), so it deliberately runs on the newest SDK.
        shell: bash
        run: |
          dotnet pack src/ConsoleAppTemplate/dotnet.consoleapp.template.pack.csproj --configuration Release --output ./smoke-packages
          dotnet pack src/SubCommandTemplate/dotnet.subcommand.template.pack.csproj --configuration Release --output ./smoke-packages
          dotnet pack src/EtlSubCommandTemplate/dotnet.etl-subcommand.template.pack.csproj --configuration Release --output ./smoke-packages

      - name: Pin consumer workspace to SDK ${{ matrix.sdk }}
        # Everything a USER does - dotnet new install, instantiate, build, run -
        # happens inside ./smoke, whose global.json pins the SDK under test.
        # Runners preinstall several SDKs and dotnet uses the newest otherwise,
        # which would defeat the matrix (including the template engine itself,
        # which also ships with the SDK).
        shell: bash
        run: |
          mkdir -p ./smoke
          cat > ./smoke/global.json <<'EOF'
          { "sdk": { "version": "${{ matrix.sdk }}.100", "rollForward": "latestFeature" } }
          EOF
          cd smoke && echo "Consumer-side SDK in use: $(dotnet --version)"

      - name: Install templates and instantiate a project
        shell: bash
        working-directory: ./smoke
        run: |
          dotnet new install ../smoke-packages/Wolfgang.Template.Console.*.nupkg
          dotnet new cwconsole -n SmokeApp -o ./smoke-app

      - name: Add subcommands via the item templates
        # Restore first: the item templates' namespace auto-detection binds to
        # msbuild:RootNamespace, which only evaluates once the project is
        # restored. This also exercises that cwsubcmd/cwsubcmdetl generate
        # compilable code in a real project (regression guard for #262). The
        # ETL subcommand needs Wolfgang.Etl.Abstractions at build time.
        shell: bash
        working-directory: ./smoke/smoke-app
        run: |
          dotnet restore
          dotnet new cwsubcmd    --ClassName ExportCommand -o Command
          dotnet new cwsubcmdetl --ClassName ImportCommand -o Command
          # Pin the version so an upstream release can't make the matrix
          # non-deterministic (fail a PR unrelated to template changes).
          dotnet add package Wolfgang.Etl.Abstractions --version 0.15.0
          echo "Generated subcommand namespaces:"
          grep -h '^namespace' Command/ExportCommand.cs Command/ImportCommand.cs
          grep -q '^namespace SmokeApp\.Command;' Command/ExportCommand.cs || { echo "::error::cwsubcmd namespace not auto-detected (expected 'SmokeApp.Command')"; exit 1; }
          grep -q '^namespace SmokeApp\.Command;' Command/ImportCommand.cs || { echo "::error::cwsubcmdetl namespace not auto-detected (expected 'SmokeApp.Command')"; exit 1; }

      - name: Build generated project (Release)
        working-directory: ./smoke/smoke-app
        run: dotnet build SmokeApp.csproj --configuration Release

      - name: Run generated app
        shell: bash
        working-directory: ./smoke/smoke-app
        run: |
          dotnet run --project SmokeApp.csproj -c Release --no-build -- --version
          # All three commands should be auto-registered (sample + the two we added).
          # Match command-list lines ("  <name>   <description>") anchored at the
          # start rather than a bare substring, so a command name appearing inside a
          # description can't produce a false positive.
          help_output="$(dotnet run --project SmokeApp.csproj -c Release --no-build -- --help)"
          for cmd in sample export import; do
            echo "$help_output" | grep -qE "^[[:space:]]+${cmd}([[:space:]]|\$)" || { echo "::error::auto-registered '$cmd' subcommand missing from the --help command list"; exit 1; }
          done

  # ============================================================================
  # INSPECTCODE: JetBrains ReSharper InspectCode, parallel to the other jobs
  # (issue #235). Runs concurrently (needs: detect-projects only) so it doesn't
  # extend wall-clock. Inspects the console-app template's Content project - the
  # real, compilable C# users receive - via src/ConsoleAppTemplate.sln. (The
  # item templates carry {DefaultNamespace} placeholder tokens, so they aren't a
  # compilable project and can't be inspected here.) SARIF uploads to GitHub
  # Code Scanning; error-severity findings fail the job, warnings surface but
  # don't gate (tune the noise floor via a root .DotSettings later).
  # Synced from the canonical repo-template job; adapted for this repo's
  # under-src solution (no root .sln/.slnx).
  # ============================================================================
  inspectcode:
    name: "ReSharper InspectCode"
    runs-on: ubuntu-latest
    needs: detect-projects
    if: github.repository != 'Chris-Wolfgang/repo-template' && needs.detect-projects.outputs.has-projects == 'true'
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # required for upload-sarif

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore + Build (Release)
        # This repo has no root solution - the solution lives at
        # src/ConsoleAppTemplate.sln. Pass it explicitly (a bare dotnet
        # restore/build would fail with MSB1003).
        run: |
          dotnet restore src/ConsoleAppTemplate.sln
          dotnet build src/ConsoleAppTemplate.sln -c Release --no-restore

      - name: Install JetBrains.ReSharper.GlobalTools
        run: dotnet tool install -g JetBrains.ReSharper.GlobalTools

      - name: Run InspectCode
        run: |
          SLN=src/ConsoleAppTemplate.sln
          if [ ! -f "$SLN" ]; then
            echo "::error::$SLN not found — InspectCode needs the solution to run."
            exit 1
          fi
          echo "Inspecting: $SLN"
          jb inspectcode "$SLN" \
            --output=inspect.sarif \
            --format=sarif \
            --severity=WARNING \
            --no-build

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: inspect.sarif

      - name: Gate on error-severity findings
        run: |
          # SARIF level=error fails the job; warnings still upload (visible in
          # Security → Code scanning) but don't gate merge — raise to `error`
          # later when the noise floor is acceptable.
          count=$(jq '[.runs[].results[] | select(.level=="error")] | length' inspect.sarif)
          if [ "$count" -gt 0 ]; then
            echo "::error::$count InspectCode error-severity finding(s) — see Security → Code scanning"
            exit 1
          fi
          echo "✅ No error-severity InspectCode findings."

  # ============================================================================
  # SECURITY: DevSkim static analysis
  # ============================================================================
  security-scan:
    name: "Security Scan (DevSkim)"
    runs-on: ubuntu-latest
    needs: detect-projects
    if: github.repository != 'Chris-Wolfgang/repo-template' && needs.detect-projects.outputs.has-projects == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: '10.0.x'

      - name: Install DevSkim CLI
        run: dotnet tool install --global Microsoft.CST.DevSkim.CLI

      - name: Run DevSkim Security Scan
        run: devskim analyze --source-code . --file-format text -E --ignore-rule-ids DS176209,DS137138 --ignore-globs "**/api/**,**/CoverageReport/**,**/TestResults/**" --output-file devskim-results.txt

      - name: Show DevSkim Results in Summary
        if: failure()
        run: |
          echo "### DevSkim Security Issues Found"
          cat devskim-results.txt
        shell: bash

      - name: Upload DevSkim Results as Artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: devskim-results
          path: devskim-results.txt
