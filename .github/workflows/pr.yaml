# PR validation workflow for template pack repository
# Builds all template projects and runs security scanning
# No test stage — this repo contains only dotnet new templates
#
# SECURITY NOTE:
# - Uses pull_request_target to run workflow from the trusted main branch
# - This prevents malicious workflow YAML changes in untrusted PR branches from taking effect
# - All checkout steps use PR refs (refs/pull/*/head) to check out PR code
# - Configuration files (.editorconfig, etc.) are fetched from main to prevent bypasses
# - persist-credentials: false prevents the checkout token from being written to git config

name: PR Checks

permissions:
  contents: read

on:
  pull_request_target:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # SECRETS SCAN: Detect leaked credentials before merge
  # ============================================================================
  secrets-scan:
    name: "Secrets Scan (gitleaks)"
    runs-on: ubuntu-latest
    if: github.repository != 'Chris-Wolfgang/repo-template'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          GITLEAKS_VERSION="8.24.0"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --verbose --redact
        shell: bash

  # ============================================================================
  # DETECTION: Check if .csproj files exist
  # ============================================================================
  detect-projects:
    name: "Detect .NET Projects"
    runs-on: ubuntu-latest
    if: github.repository != 'Chris-Wolfgang/repo-template'
    outputs:
      has-projects: ${{ steps.check-projects.outputs.has-projects }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false

      - name: Fetch trusted configuration files from main branch
        # Skip for Dependabot — its package-version bumps to protected files
        # (e.g. Directory.Build.props analyzer references) are legitimate. The
        # threat model is human PR authors disabling analyzers in their own PRs,
        # not a trusted GitHub-controlled bot whose only action is package bumps.
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          echo "Fetching configuration files from main branch to prevent malicious overrides..."
          git fetch origin main:main-branch

          config_files=(
            ".editorconfig"
            "Directory.Build.props"
            "Directory.Build.targets"
            "BannedSymbols.txt"
            "*.globalconfig"
            "*.ruleset"
          )

          for config_file in "${config_files[@]}"; do
            if [[ "$config_file" == *"*"* ]]; then
              git ls-tree -r --name-only main-branch | grep -E "${config_file//\*/.*}" | while read -r file; do
                if [ -n "$file" ]; then
                  echo "  ✓ Copying $file from main branch"
                  mkdir -p "$(dirname "$file")"
                  git show "main-branch:$file" > "$file" || echo "  ⚠️  Failed to copy $file"
                fi
              done
            else
              if git cat-file -e "main-branch:$config_file" 2>/dev/null; then
                echo "  ✓ Copying $config_file from main branch"
                git show "main-branch:$config_file" > "$config_file"
              else
                echo "  ℹ️  $config_file not found in main branch, skipping"
              fi
            fi
          done

          echo ""
          echo "✅ Configuration files secured - using versions from main branch"

      - name: Detect protected configuration file changes
        # Skip for Dependabot — its package-version bumps to protected files
        # (e.g. Directory.Build.props analyzer references) are legitimate. The
        # threat model is human PR authors disabling analyzers in their own PRs,
        # not a trusted GitHub-controlled bot whose only action is package bumps.
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          echo "Checking for changes to protected configuration files in this PR..."

          if ! git cat-file -e main-branch 2>/dev/null; then
            echo "❌ main-branch ref not found - cannot detect configuration file changes"
            exit 1
          fi

          changed_files=()

          exact_files=(
            ".editorconfig"
            "Directory.Build.props"
            "Directory.Build.targets"
            "BannedSymbols.txt"
          )

          for config_file in "${exact_files[@]}"; do
            if ! git diff --quiet main-branch HEAD -- "$config_file" 2>/dev/null; then
              changed_files+=("$config_file")
            fi
          done

          while IFS= read -r file; do
            changed_files+=("$file")
          done < <(git diff --name-only --diff-filter=AMRC main-branch HEAD 2>/dev/null | grep -E '\.(globalconfig|ruleset)$' || true)

          if [ ${#changed_files[@]} -gt 0 ]; then
            echo ""
            echo "⚠️  PROTECTED CONFIGURATION FILES CHANGED IN THIS PR:"
            for file in "${changed_files[@]}"; do
              echo "  - $file"
            done
            echo ""
            echo "❌ CI uses the main branch version of these files to prevent security bypasses."
            echo "   The PR's changes to these files were NOT tested by CI."
            echo "   A maintainer must manually review and verify these changes before merging."
            exit 1
          else
            echo "✅ No protected configuration files changed - CI fully validates this PR"
          fi

      - name: Check for .NET project files
        id: check-projects
        run: |
          if git ls-files '*.csproj' '*.vbproj' '*.fsproj' | grep -q .; then
            echo "has-projects=true" >> "$GITHUB_OUTPUT"
            echo "✅ Found .NET project files"
          else
            echo "has-projects=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No .NET project files found - skipping build"
          fi

  # ============================================================================
  # BUILD: Validate all template projects compile and pack
  # ============================================================================
  build-and-validate:
    name: "Build & Validate Templates"
    runs-on: windows-latest
    needs: detect-projects
    if: github.repository != 'Chris-Wolfgang/repo-template' && needs.detect-projects.outputs.has-projects == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false

      - name: Fetch trusted configuration files from main branch
        # Skip for Dependabot — its package-version bumps to protected files
        # (e.g. Directory.Build.props analyzer references) are legitimate. The
        # threat model is human PR authors disabling analyzers in their own PRs,
        # not a trusted GitHub-controlled bot whose only action is package bumps.
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        shell: pwsh
        run: |
          Write-Host "Fetching configuration files from main branch to prevent malicious overrides..."
          git fetch origin main:main-branch

          $configFiles = @(
            ".editorconfig",
            "Directory.Build.props",
            "Directory.Build.targets",
            "BannedSymbols.txt"
          )

          foreach ($configFile in $configFiles) {
            $exists = git cat-file -e "main-branch:$configFile" 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "  ✓ Copying $configFile from main branch"
              # Out-File -NoNewline concatenates ALL pipeline lines into one giant
              # line, silently corrupting the fetched file (an unparseable
              # .editorconfig makes every analyzer fall back to default severity).
              # Set-Content writes the lines joined with proper newlines.
              git show "main-branch:$configFile" | Set-Content -Path $configFile -Encoding utf8NoBOM
            } else {
              Write-Host "  ℹ️  $configFile not found in main branch, skipping"
            }
          }

          Write-Host ""
          Write-Host "✅ Configuration files secured - using versions from main branch"

          # Reset exit code — git cat-file -e leaves $LASTEXITCODE=1 for missing files
          exit 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Restore and build all projects (Release)
        shell: pwsh
        run: |
          $projects = Get-ChildItem -Path 'src' -Recurse -Filter '*.csproj'

          if ($projects.Count -eq 0) {
            Write-Error "❌ No projects found in src/ directory"
            exit 1
          }

          foreach ($proj in $projects) {
            Write-Host "📦 Restoring $($proj.Name)" -ForegroundColor Cyan
            dotnet restore $proj.FullName

            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Restore failed for $($proj.Name)"
              exit $LASTEXITCODE
            }

            Write-Host "🔨 Building $($proj.Name)" -ForegroundColor Cyan
            dotnet build $proj.FullName --no-restore --configuration Release

            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Build failed for $($proj.Name)"
              exit $LASTEXITCODE
            }
          }

          Write-Host "✅ All projects built successfully" -ForegroundColor Green

      - name: Pack NuGet packages (validate packaging)
        shell: pwsh
        run: |
          $packagesPath = Join-Path $PWD 'nuget-packages'
          New-Item -ItemType Directory -Force -Path $packagesPath | Out-Null

          $packProjects = Get-ChildItem -Path 'src' -Recurse -Filter '*.csproj' | Where-Object {
            $_.Name -like '*template.pack*'
          }

          foreach ($proj in $packProjects) {
            Write-Host "📦 Packing $($proj.Name)" -ForegroundColor Cyan
            dotnet pack $proj.FullName --no-build --configuration Release --output $packagesPath

            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Pack failed for $($proj.Name)"
              exit $LASTEXITCODE
            }
          }

          $packages = Get-ChildItem -Path $packagesPath -Filter '*.nupkg'
          Write-Host "✅ Created $($packages.Count) NuGet package(s):" -ForegroundColor Green
          $packages | ForEach-Object { Write-Host "   $($_.Name)" }

  # ============================================================================
  # SMOKE MATRIX: build the GENERATED project across OS x SDK
  #
  # The generated project is a different build environment than this repo:
  # no .editorconfig (analyzer DEFAULT severities apply), the user's SDK
  # (LangVersion=latest resolves per SDK - a C# 13 escape broke .NET 8 SDK
  # users while the repo built fine on SDK 10), and Release builds treat
  # warnings as errors. This matrix packs the console template, installs
  # it, instantiates a project and builds/runs it the way a user would.
  # SDK 8 (the documented minimum) runs on all three OSes; newer SDKs are
  # spot-checked on Linux.
  # ============================================================================
  template-smoke-matrix:
    name: "Template Smoke (${{ matrix.os }}, SDK ${{ matrix.sdk }})"
    runs-on: ${{ matrix.os }}
    needs: detect-projects
    # Same-repo PRs only: under pull_request_target secrets are available to
    # the workflow, and this job goes beyond building PR code - it RUNS the
    # generated app. Skipping forked PRs closes the exfiltration path; a
    # maintainer can re-run the smoke matrix after pulling a fork's changes
    # into a same-repo branch.
    if: >-
      github.repository != 'Chris-Wolfgang/repo-template' &&
      needs.detect-projects.outputs.has-projects == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sdk: "8.0"
          - os: windows-latest
            sdk: "8.0"
          - os: macos-latest
            sdk: "8.0"
          - os: ubuntu-latest
            sdk: "9.0"
          - os: ubuntu-latest
            sdk: "10.0"
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false

      - name: Setup .NET
        # The matrix SDK builds the generated project; 10.0.x packs the
        # template itself (the pack csproj targets netstandard2.0).
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            ${{ matrix.sdk }}.x
            10.0.x

      - name: Pack the console template
        # Packing is the repo's side of the workflow (the release pipeline does
        # it with the repo's SDK), so it deliberately runs on the newest SDK.
        run: dotnet pack src/ConsoleAppTemplate/dotnet.consoleapp.template.pack.csproj --configuration Release --output ./smoke-packages

      - name: Pin consumer workspace to SDK ${{ matrix.sdk }}
        # Everything a USER does - dotnet new install, instantiate, build, run -
        # happens inside ./smoke, whose global.json pins the SDK under test.
        # Runners preinstall several SDKs and dotnet uses the newest otherwise,
        # which would defeat the matrix (including the template engine itself,
        # which also ships with the SDK).
        shell: bash
        run: |
          mkdir -p ./smoke
          cat > ./smoke/global.json <<'EOF'
          { "sdk": { "version": "${{ matrix.sdk }}.100", "rollForward": "latestFeature" } }
          EOF
          cd smoke && echo "Consumer-side SDK in use: $(dotnet --version)"

      - name: Install template and instantiate a project
        shell: bash
        working-directory: ./smoke
        run: |
          dotnet new install ../smoke-packages/Wolfgang.Template.Console.*.nupkg
          dotnet new cwconsole -n SmokeApp -o ./smoke-app

      - name: Build generated project (Release)
        working-directory: ./smoke/smoke-app
        run: dotnet build SmokeApp.csproj --configuration Release

      - name: Run generated app
        shell: bash
        working-directory: ./smoke/smoke-app
        run: |
          dotnet run --project SmokeApp.csproj -c Release --no-build -- --version
          dotnet run --project SmokeApp.csproj -c Release --no-build -- --help | grep -q "sample" || { echo "::error::auto-registered 'sample' subcommand missing from --help output"; exit 1; }

  # ============================================================================
  # SECURITY: DevSkim static analysis
  # ============================================================================
  security-scan:
    name: "Security Scan (DevSkim)"
    runs-on: ubuntu-latest
    needs: detect-projects
    if: github.repository != 'Chris-Wolfgang/repo-template' && needs.detect-projects.outputs.has-projects == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install DevSkim CLI
        run: dotnet tool install --global Microsoft.CST.DevSkim.CLI

      - name: Run DevSkim Security Scan
        run: devskim analyze --source-code . --file-format text -E --ignore-rule-ids DS176209,DS137138 --ignore-globs "**/api/**,**/CoverageReport/**,**/TestResults/**" --output-file devskim-results.txt

      - name: Show DevSkim Results in Summary
        if: failure()
        run: |
          echo "### DevSkim Security Issues Found"
          cat devskim-results.txt
        shell: bash

      - name: Upload DevSkim Results as Artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: devskim-results
          path: devskim-results.txt
