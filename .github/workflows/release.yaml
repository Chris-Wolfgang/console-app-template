name: Release on Version Tag

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Solution (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Run tests for all test projects
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path ./tests -Filter '*Test*.csproj' -File -Recurse -ErrorAction SilentlyContinue
          if ($testProjects) {
            foreach ($proj in $testProjects) {
              Write-Host "Running tests for $($proj.FullName)"
              dotnet test "$($proj.FullName)" --no-build --configuration Release
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Tests failed for $($proj.FullName)"
                exit $LASTEXITCODE
              }
            }
          } else {
            Write-Host "No test projects found in ./tests directory"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: '**/TestResults*.trx'

  publish:
    name: Pack and Publish NuGet
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Restore dependencies
        run: dotnet restore

      - name: Build Solution (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Pack NuGet Package for Each Template Project (Release)
        shell: bash
        run: |
            dotnet pack src/ConsoleAppTemplate/dotnet.consoleapp.template.pack.csproj --no-build --configuration Release --output ./nuget-packages
            dotnet pack src/SubCommandTemplate/dotnet.subcommand.template.pack.csproj --no-build --configuration Release --output ./nuget-packages
      - name: Publish NuGet Package
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }} # Ensure this secret is set in repository settings
        run: |
          for pkg in ./nuget-packages/*.nupkg; do
            dotnet nuget push "$pkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json
          done
