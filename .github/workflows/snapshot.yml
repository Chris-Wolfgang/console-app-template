name: Snapshot test

# Approval/snapshot test for the generated project (issue #208). Regenerates a
# project from cwconsole and compares a normalized per-file hash manifest against
# the committed golden (tests/snapshots/cwconsole.manifest). Catches content and
# structure drift in what the template GENERATES — including changes that still
# compile, which the build-based smoke matrix can't see.
#
# When a template change is intentional, run `./tests/snapshots/snapshot.sh --update`
# and commit the updated golden.

on:
  pull_request:
    paths:
      - 'src/ConsoleAppTemplate/Content/**'
      - 'src/ConsoleAppTemplate/**/*.csproj'
      - 'tests/snapshots/**'
      - '.github/workflows/snapshot.yml'
  push:
    branches: [main]
    paths:
      - 'src/ConsoleAppTemplate/Content/**'
      - 'src/ConsoleAppTemplate/**/*.csproj'
      - 'tests/snapshots/**'
      - '.github/workflows/snapshot.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    name: Verify generated-output snapshot
    runs-on: ubuntu-latest
    if: github.repository != 'Chris-Wolfgang/repo-template'
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 8.0.x

      - name: Check generated output against the golden snapshot
        run: ./tests/snapshots/snapshot.sh --check
